<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선교지를 찾아라!</title>
    
    <!-- 부드럽고 깔끔한 프리텐다드 변형 폰트 사용 -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <!-- 폭죽 효과 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { 
            --primary-color: #2563eb; 
            --bg-color: #f1f5f9; 
        }

        body { 
            /* 부드러운 느낌을 주는 폰트 세팅 */
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; 
            background: var(--bg-color); 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            color: #1e293b;
            word-break: keep-all; /* 한글 줄바꿈을 예쁘게 */
        }

        .container { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 24px; /* 더 둥글게 수정 */
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            text-align: center; 
            width: 90%; 
            max-width: 450px; 
            z-index: 10; 
        }

        h1 { 
            color: #0f172a; 
            font-size: 1.8rem; 
            font-weight: 800;
            margin-bottom: 0.5rem; 
            letter-spacing: -0.03em;
        }

        p.subtitle {
            color: #64748b;
            margin-bottom: 2rem;
            font-size: 1rem;
            font-weight: 500;
        }

        .btn-mission { 
            background: var(--primary-color); 
            color: white; 
            border: none; 
            padding: 18px 32px; 
            font-size: 1.1rem; 
            font-weight: 700; 
            border-radius: 16px; /* 버튼도 더 부드럽게 */
            cursor: pointer; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            display: inline-flex; 
            align-items: center; 
            gap: 10px; 
            width: 100%;
            justify-content: center;
        }

        .btn-mission:hover {
            background: #1d4ed8;
            transform: scale(1.02);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }

        #result-card { 
            margin-top: 2rem; 
            padding: 1.8rem; 
            border-radius: 20px; 
            background: #f8fafc; 
            border: 1px solid #e2e8f0; 
            display: none; 
            animation: slideUp 0.5s ease-out; 
        }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .flag { font-size: 4rem; margin-bottom: 15px; display: block; }
        .country-name { font-size: 1.5rem; font-weight: 800; color: #0f172a; margin-bottom: 20px; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .info-item { background: white; padding: 14px; border-radius: 12px; border: 1px solid #f1f5f9; text-align: left; }
        .info-label { font-weight: 700; color: #2563eb; font-size: 0.8rem; display: block; margin-bottom: 4px; }
        .info-value { font-weight: 700; font-size: 1rem; color: #334155; }
        
        #description { color: #475569; font-size: 0.95rem; line-height: 1.7; text-align: left; word-break: keep-all; }

        .footer { margin-top: 50px; text-align: center; padding-bottom: 30px; }
        .maker-tag { font-size: 0.85rem; color: #94a3b8; font-weight: 600; letter-spacing: 0.05em; }
        .maker-name { 
            display: inline-block;
            margin-top: 8px;
            font-size: 1.1rem;
            font-weight: 800;
            color: #1e293b;
            padding: 6px 16px;
            border-bottom: 3px solid #2563eb; /* 바닥 선으로 더 세련되게 */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>선교지를 찾아라!</h1>
        <p class="subtitle">마음을 담아 선교지를 검색해보세요.</p>
        
        <button class="btn-mission" onclick="findMission()">
            <i class="fas fa-search"></i> 선교지 찾기
        </button>

        <div id="result-card">
            <span id="flag-icon" class="flag">📍</span>
            <div id="country" class="country-name">국가 정보</div>
            <div class="info-grid">
                <div class="info-item">
                    <span class="info-label">주요 종교</span>
                    <span id="religion" class="info-value">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">기독교 비율</span>
                    <span id="percent" class="info-value">-</span>
                </div>
            </div>
            <p id="description"></p>
        </div>
    </div>

    <div class="footer">
        <span class="maker-tag">CREATED BY</span><br>
        <div class="maker-name">제작자: 지민</div>
    </div>

    <script>
        const missionFields = [
            { name: "인도 (India)", flag: "🇮🇳", religion: "힌두교 (79.5%)", percent: "2.1%", desc: "미전도 종족이 가장 많은 나라입니다. 약 2,000개의 종족이 여전히 복음을 기다리고 있습니다." },
            { name: "파키스탄 (Pakistan)", flag: "🇵🇰", religion: "이슬람교 (96.5%)", percent: "0.6%", desc: "신앙의 자유가 제한적인 곳입니다. 현지 성도들의 안전과 복음 전파를 위해 기도가 필요합니다." },
            { name: "이란 (Iran)", flag: "🇮🇷", religion: "이슬람교 (99.4%)", percent: "0.4%", desc: "핍박 속에서도 지하 교회를 통해 하나님을 만나는 사람들이 전 세계에서 가장 빠르게 늘고 있습니다." },
            { name: "네팔 (Nepal)", flag: "🇳🇵", religion: "힌두교 (80.6%)", percent: "2.9%", desc: "히말라야의 나라 네팔은 최근 복음화가 빠르게 진행되며 많은 영적 열매를 맺고 있습니다." },
            { name: "알제리 (Algeria)", flag: "🇩🇿", religion: "이슬람교 (99.0%)", percent: "0.3%", desc: "북아프리카의 넓은 땅, 사막의 종족들에게 하나님의 사랑이 전해지길 소망합니다." },
            { name: "모로코 (Morocco)", flag: "🇲🇦", religion: "이슬람교 (99.6%)", percent: "0.1% 미만", desc: "강력한 이슬람 전통 속에 있는 나라입니다. 조용한 복음의 통로가 열리길 기도합니다." },
            { name: "태국 (Thailand)", flag: "🇹🇭", religion: "불교 (94.6%)", percent: "1.2%", desc: "미소의 나라 태국은 불교 문화가 깊게 자리 잡고 있어 영적인 돌파가 필요한 선교지입니다." },
            { name: "소말리아 (Somalia)", flag: "🇸🇴", religion: "이슬람교 (99.8%)", percent: "0.01% 미만", desc: "오랜 내전과 기근으로 고통받는 땅입니다. 평화와 복음의 생명력이 절실히 필요합니다." },
            { name: "부탄 (Bhutan)", flag: "🇧🇹", religion: "불교 (74.7%)", percent: "2.1%", desc: "히말라야 은둔의 왕국 부탄의 성도들이 자유롭게 예배할 수 있는 날을 기다립니다." },
            { name: "터키 (Turkey)", flag: "🇹🇷", religion: "이슬람교 (98.6%)", percent: "0.2%", desc: "초기 기독교의 유적이 많으나 현재는 기독교인을 찾기 매우 어려운 영적 불모지입니다." },
            { name: "아프가니스탄 (Afghanistan)", flag: "🇦🇫", religion: "이슬람교 (99.7%)", percent: "0.1% 미만", desc: "복음이 전해지기 매우 위험한 상황입니다. 숨어 있는 성도들을 위한 강력한 기도가 필요합니다." },
            { name: "예멘 (Yemen)", flag: "🇾🇪", religion: "이슬람교 (99.1%)", percent: "0.1% 미만", desc: "전쟁의 아픔이 있는 곳입니다. 고난받는 예멘 사람들에게 하늘의 위로가 임하길 소망합니다." },
            { name: "미얀마 (Myanmar)", flag: "🇲🇲", religion: "불교 (87.9%)", percent: "7.9%", desc: "다수 종족인 버마족을 향한 선교적 관심이 더 필요하며, 나라의 안정을 위해 기도합니다." },
            { name: "일본 (Japan)", flag: "🇯🇵", religion: "신토/불교 (90%+)", percent: "0.8%", desc: "풍요 속의 고독을 겪는 일본 사회에 참된 소망인 예수 그리스도가 전해지길 기도합니다." },
            { name: "북한 (North Korea)", flag: "🇰🇵", religion: "무교/주체사상", percent: "1.5% 미만", desc: "가장 굳게 닫힌 문이 열리고, 고통받는 동포들에게 자유와 복음이 전해질 날을 기대합니다." },
            { name: "방글라데시 (Bangladesh)", flag: "🇧🇩", religion: "이슬람교 (89.1%)", percent: "0.4%", desc: "인구 밀도가 매우 높은 섬김의 땅입니다. 가난을 넘어선 복음의 풍성함이 있길 소망합니다." },
            { name: "라오스 (Laos)", flag: "🇱🇦", religion: "불교 (66.0%)", percent: "2.6%", desc: "제약이 많은 환경이지만, 가정 교회를 통해 생명력 있게 복음이 퍼져나가고 있습니다." },
            { name: "캄보디아 (Cambodia)", flag: "🇰🇭", religion: "불교 (97.9%)", percent: "1.6%", desc: "킬링필드의 아픔을 딛고, 복음 안에서 새로운 희망과 치유가 일어나길 기도합니다." },
            { name: "사우디아라비아 (Saudi)", flag: "🇸🇦", religion: "이슬람교 (93%+)", percent: "1.2%", desc: "이슬람의 성지입니다. 현지인들이 진정한 하나님을 만나는 역사가 일어나길 소망합니다." },
            { name: "리비아 (Libya)", flag: "🇱🇾", religion: "이슬람교 (97.0%)", percent: "0.5% 미만", desc: "북아프리카의 관문 리비아에 평화의 왕이신 예수님의 소식이 전해지길 기도합니다." },
            { name: "말리 (Mali)", flag: "🇲🇱", religion: "이슬람교 (90.0%)", percent: "2.3%", desc: "서아프리카의 다양한 종족들에게 사랑의 손길과 복음이 닿기를 간절히 소망합니다." },
            { name: "모리타니 (Mauritania)", flag: "🇲🇷", religion: "이슬람교 (100%)", percent: "0.1% 미만", desc: "국민 전체가 무슬림으로 알려진 곳입니다. 단 한 사람의 기독교인도 찾기 어려운 땅입니다." },
            { name: "니제르 (Niger)", flag: "🇳🇪", religion: "이슬람교 (98.0%)", percent: "0.5% 미만", desc: "사하라 사막의 열기보다 뜨거운 복음의 열정이 이 땅에 가득 차기를 기도합니다." },
            { name: "오만 (Oman)", flag: "🇴🇲", religion: "이슬람교 (85.9%)", percent: "1.0% 미만", desc: "안정적이지만 견고한 이슬람 문화권입니다. 성령의 바람이 불어오길 소망합니다." },
            { name: "이라크 (Iraq)", flag: "🇮🇶", religion: "이슬람교 (98.9%)", percent: "0.5% 미만", desc: "성경의 많은 사건이 일어난 이곳에 다시 한번 교회가 회복되는 역사가 있길 기도합니다." },
            { name: "수단 (Sudan)", flag: "🇸🇩", religion: "이슬람교 (90%+)", percent: "3.0% 미만", desc: "박해 속에서도 믿음을 지키는 남은 자들이 강건하도록 기도가 필요합니다." },
            { name: "몽골 (Mongolia)", flag: "🇲🇳", religion: "불교 (53.0%)", percent: "2.1%", desc: "드넓은 초원 위에 세워진 몽골 교회들이 영적으로 더 성숙해지기를 소망합니다." },
            { name: "우즈베키스탄 (Uzbekistan)", flag: "🇺🇿", religion: "이슬람교 (88.0%)", percent: "1.0% 미만", desc: "중앙아시아의 복음화를 위해 중요한 위치에 있는 나라입니다. 문이 열리길 기도합니다." },
            { name: "투르크메니스탄 (Turkmenistan)", flag: "🇹🇲", religion: "이슬람교 (93.0%)", percent: "0.1% 미만", desc: "매우 폐쇄적인 국가입니다. 하나님의 사랑이 모든 장벽을 넘어 전해지길 소망합니다." },
            { name: "베트남 (Vietnam)", flag: "🇻🇳", religion: "무교/불교 (80%+)", percent: "9.5%", desc: "성장하는 베트남 교회가 주변 미전도 종족들을 품는 선교적 교회가 되길 기도합니다." }
        ];

        function findMission() {
            const field = missionFields[Math.floor(Math.random() * missionFields.length)];
            
            const card = document.getElementById('result-card');
            card.style.display = 'block';
            
            document.getElementById('flag-icon').innerText = field.flag;
            document.getElementById('country').innerText = field.name;
            document.getElementById('religion').innerText = field.religion;
            document.getElementById('percent').innerText = field.percent;
            document.getElementById('description').innerText = field.desc;

            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#2563eb', '#93c5fd', '#ffffff']
            });
        }
    </script>
</body>
</html>
