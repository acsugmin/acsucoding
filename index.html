<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 선교지를 찾아라!</title>
    
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { 
            --primary-color: #74b9ff; 
            --bg-color: #fff9f0;      
        }

        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: var(--bg-color); 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            color: #2d3436;
        }

        .container { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 40px; 
            box-shadow: 0 15px 0 rgba(116, 185, 255, 0.1); 
            text-align: center; 
            width: 85%; 
            max-width: 400px; 
            border: 4px solid #74b9ff;
        }

        h1 { color: #0984e3; font-size: 1.8rem; font-weight: 800; margin-bottom: 0.5rem; }
        p.subtitle { color: #636e72; margin-bottom: 2rem; font-size: 1rem; }

        .btn-mission { 
            background: var(--primary-color); 
            color: white; 
            border: none; 
            padding: 18px 30px; 
            font-size: 1.2rem; 
            font-weight: 800; 
            border-radius: 30px; 
            cursor: pointer; 
            display: inline-flex; 
            align-items: center; 
            gap: 12px; 
            width: 100%;
            justify-content: center;
            box-shadow: 0 6px 0 #0984e3;
            transition: all 0.2s;
        }

        .btn-mission:active { transform: translateY(4px); box-shadow: 0 2px 0 #0984e3; }

        #result-card { 
            margin-top: 2.5rem; 
            padding: 1.5rem; 
            border-radius: 30px; 
            background: #f0f7ff; 
            border: 3px dashed #74b9ff; 
            display: none; 
        }

        .flag-box { font-size: 4.5rem; margin-bottom: 10px; }
        .country-name { font-size: 1.6rem; font-weight: 800; margin-bottom: 15px; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .info-item { background: white; padding: 10px; border-radius: 15px; border: 1px solid #e1f0ff; }
        .info-label { font-weight: 800; color: #74b9ff; font-size: 0.75rem; display: block; }
        .info-value { font-weight: 800; font-size: 0.9rem; }
        #description { color: #636e72; font-size: 0.95rem; line-height: 1.6; text-align: left; background: white; padding: 15px; border-radius: 20px; }

        .footer { margin-top: 40px; text-align: center; }
        .maker-name { 
            display: inline-block;
            background: #fab1a0;
            color: white;
            padding: 8px 25px;
            border-radius: 40px 0 40px 0;
            font-weight: 800;
            box-shadow: 4px 4px 0 #e17055;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>✨ 선교지를 찾아라! ✨</h1>
        <p class="subtitle">어떤 나라를 위해 기도할까요? 🔍</p>
        
        <button class="btn-mission" onclick="findMission()">
            <i class="fas fa-search"></i> 선교지 찾기!
        </button>

        <div id="result-card">
            <div id="flag-icon" class="flag-box">📍</div>
            <div id="country" class="country-name">국가 정보</div>
            <div class="info-grid">
                <div class="info-item">
                    <span class="info-label">🕍 주요 종교</span>
                    <span id="religion" class="info-value">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">⛪ 기독교 비율</span>
                    <span id="percent" class="info-value">-</span>
                </div>
            </div>
            <div id="description"></div>
        </div>
    </div>

    <div class="footer">
        <div class="maker-name">✨ Project by 지민 ✨</div>
    </div>

    <script>
        // 30개국 데이터 (오타 없이 정렬 완료!)
        const missionFields = [
            { name: "인도", flag: "🇮🇳", religion: "힌두교", percent: "2.1%", desc: "미전도 종족이 가장 많은 나라입니다. 복음을 기다리는 이들을 위해 기도해주세요." },
            { name: "파키스탄", flag: "🇵🇰", religion: "이슬람교", percent: "0.6%", desc: "현지 성도들이 안전하게 예배드릴 수 있도록 기도가 필요합니다." },
            { name: "이란", flag: "🇮🇷", religion: "이슬람교", percent: "0.4%", desc: "지하 교회를 통해 복음의 불길이 뜨겁게 타오르는 땅입니다." },
            { name: "네팔", flag: "🇳🇵", religion: "힌두교", percent: "2.9%", desc: "히말라야 산맥을 따라 하나님의 영광이 선포되길 소망합니다." },
            { name: "알제리", flag: "🇩🇿", religion: "이슬람교", percent: "0.3%", desc: "북아프리카의 영적 회복과 무슬림들의 회심을 위해 기도해주세요." },
            { name: "모로코", flag: "🇲🇦", religion: "이슬람교", percent: "0.1%", desc: "복음의 문이 열려 자유롭게 예수님을 전할 날을 기대합니다." },
            { name: "태국", flag: "🇹🇭", religion: "불교", percent: "1.2%", desc: "불교 전통이 강한 이곳에 성령의 강력한 바람이 불길 소망합니다." },
            { name: "소말리아", flag: "🇸🇴", religion: "이슬람교", percent: "0.01%", desc: "극심한 고난 속에 있는 소말리아에 평화의 왕이 임하시길 기도합니다." },
            { name: "부탄", flag: "🇧🇹", religion: "불교", percent: "2.1%", desc: "은둔의 왕국 부탄에도 십자가의 사랑이 전해지길 바랍니다." },
            { name: "터키", flag: "🇹🇷", religion: "이슬람교", percent: "0.2%", desc: "성경의 땅 터키가 다시 한번 주님의 품으로 돌아오길 기도합니다." },
            { name: "아프가니스탄", flag: "🇦🇫", religion: "이슬람교", percent: "0.1%", desc: "고통받는 아프간 사람들에게 하늘의 위로가 전해지길 기도합니다." },
            { name: "예멘", flag: "🇾🇪", religion: "이슬람교", percent: "0.1%", desc: "전쟁이 멈추고 복음으로 인한 참된 평화가 깃들길 소망합니다." },
            { name: "미얀마", flag: "🇲🇲", religion: "불교", percent: "7.9%", desc: "나라의 안정과 함께 미얀마 모든 종족이 주를 찬양하길 기도합니다." },
            { name: "일본", flag: "🇯🇵", religion: "신토/불교", percent: "0.8%", desc: "공허한 마음으로 살아가는 일본 사람들에게 진정한 소망이 필요합니다." },
            { name: "북한", flag: "🇰🇵", religion: "무교", percent: "1.5%", desc: "억눌린 동포들에게 자유의 복음이 속히 전해지길 간절히 소망합니다." },
            { name: "방글라데시", flag: "🇧🇩", religion: "이슬람교", percent: "0.4%", desc: "인구 밀도가 높은 이 땅에 복음의 씨앗이 널리 뿌려지길 원합니다." },
            { name: "라오스", flag: "🇱🇦", religion: "불교", percent: "2.6%", desc: "제약 속에서도 믿음을 키워가는 성도들에게 새 힘을 주소서." },
            { name: "캄보디아", flag: "🇰🇭", religion: "불교", percent: "1.6%", desc: "과거의 아픔을 딛고 예수님의 사랑으로 치유되길 기도합니다." },
            { name: "사우디아라비아", flag: "🇸🇦", religion: "이슬람교", percent: "1.2%", desc: "이슬람의 중심지에 십자가의 깃발이 꽂히길 기도합니다." },
            { name: "리비아", flag: "🇱🇾", religion: "이슬람교", percent: "0.5%", desc: "정치적 혼란 속에 있는 리비아에 주님의 통치가 임하길 소망합니다." },
            { name: "말리", flag: "🇲🇱", religion: "이슬람교", percent: "2.3%", desc: "서아프리카의 미전도 종족들이 주님께 돌아오는 역사를 기대합니다." },
            { name: "모리타니", flag: "🇲🇷", religion: "이슬람교", percent: "0.1%", desc: "복음화율이 가장 낮은 이곳에 주님의 빛이 비춰지길 기도합니다." },
            { name: "니제르", flag: "🇳🇪", religion: "이슬람교", percent: "0.5%", desc: "척박한 사막 땅에 생명의 말씀이 강물처럼 흐르길 소망합니다." },
            { name: "오만", flag: "🇴🇲", religion: "이슬람교", percent: "1.0%", desc: "닫혀 있는 현지인들의 마음 문이 성령으로 열리길 기도합니다." },
            { name: "이라크", flag: "🇮🇶", religion: "이슬람교", percent: "0.5%", desc: "전쟁의 폐허 위에 하나님의 성전이 다시 세워지길 기도합니다." },
            { name: "수단", flag: "🇸🇩", religion: "이슬람교", percent: "3.0%", desc: "박해 속에서도 인내하는 그리스도인들을 주께서 지켜주소서." },
            { name: "몽골", flag: "🇲🇳", religion: "불교", percent: "2.1%", desc: "광활한 초원의 몽골 교회들이 아시아를 살리는 통로가 되길 원합니다." },
            { name: "우즈베키스탄", flag: "🇺🇿", religion: "이슬람교", percent: "1.0%", desc: "중앙아시아의 영혼들이 복음 안에서 참 자유를 얻길 소망합니다." },
            { name: "투르크메니스탄", flag: "🇹🇲", religion: "이슬람교", percent: "0.1%", desc: "철저히 닫힌 이 땅의 문을 주께서 열어주시길 기도합니다." },
            { name: "베트남", flag: "🇻🇳", religion: "무교/불교", percent: "9.5%", desc: "베트남 교회가 선교하는 교회로 든든히 서가길 기도합니다." }
        ];

        function findMission() {
            // 랜덤으로 하나 선택
            const field = missionFields[Math.floor(Math.random() * missionFields.length)];
            
            // 화면에 보여주기
            const card = document.getElementById('result-card');
            card.style.display = 'block';
            
            document.getElementById('flag-icon').innerText = field.flag;
            document.getElementById('country').innerText = field.name;
            document.getElementById('religion').innerText = field.religion;
            document.getElementById('percent').innerText = field.percent;
            document.getElementById('description').innerText = "💌 " + field.desc;

            // 폭죽 터뜨리기
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 }
            });
        }
    </script>
</body>
</html>
