<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지민이의 미션 나침반</title>
    
    <!-- 귀여운 폰트 추가 (Single Day) -->
    <link href="https://fonts.googleapis.com/css2?family=Single+Day&display=swap" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { --primary-color: #4facfe; --secondary-color: #00f2fe; --bg-color: #f0f9ff; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-color); display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 500px; z-index: 10; }
        h1 { color: #2c3e50; font-size: 1.8rem; margin-bottom: 1rem; }
        .btn-explore { background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); color: white; border: none; padding: 15px 30px; font-size: 1.2rem; font-weight: bold; border-radius: 50px; cursor: pointer; transition: all 0.3s ease; display: inline-flex; align-items: center; gap: 10px; }
        #result-card { margin-top: 2rem; padding: 1.5rem; border-radius: 20px; background: #f8f9fa; border: 2px dashed #4facfe; display: none; animation: fadeInUp 0.5s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .flag { font-size: 3rem; }
        .country-name { font-size: 1.5rem; font-weight: 800; color: #333; margin: 10px 0; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .info-item { background: white; padding: 10px; border-radius: 10px; font-size: 0.9rem; text-align: left; }
        .info-label { font-weight: bold; color: #4facfe; font-size: 0.8rem; display: block; }
        
        /* 지민 제작자 스타일 */
        .footer { margin-top: 25px; text-align: center; font-size: 0.9rem; color: #7f8c8d; }
        .maker-name { 
            font-family: 'Single Day', cursive; 
            background: #ffeaa7; 
            padding: 6px 20px; 
            border-radius: 25px; 
            color: #d63031; 
            font-size: 1.1rem;
            display: inline-block; 
            margin-top: 8px;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1><i class="fas fa-compass"></i> 미션 나침반</h1>
        <p>버튼을 누르면 우리가 품어야 할 탐험지가 나타나요!</p>
        
        <button class="btn-explore" onclick="recommendMission()">
            <i class="fas fa-map-marked-alt"></i> 탐험 시작하기!
        </button>

        <div id="result-card">
            <div id="flag-icon" class="flag">📍</div>
            <div id="country" class="country-name">나라 이름</div>
            <div class="info-grid">
                <div class="info-item"><span class="info-label">주요 종교</span><span id="religion">-</span></div>
                <div class="info-item"><span class="info-label">기독교 비율</span><span id="percent">-</span></div>
            </div>
            <p id="description" style="margin-top: 1rem; color: #555; font-size: 0.95rem;"></p>
        </div>
    </div>

    <div class="footer">
        지구촌을 품는 따뜻한 마음<br>
        <div class="maker-name">🌟 제작자: 지민 🌟</div>
    </div>

    <script>
        const missionFields = [
            { name: "인도 (India)", flag: "🇮🇳", religion: "힌두교 (79.5%)", percent: "2.1%", desc: "세계에서 미전도 종족이 가장 많은 나라예요. 약 2,000개가 넘는 종족이 복음을 기다려요." },
            { name: "파키스탄 (Pakistan)", flag: "🇵🇰", religion: "이슬람교 (96.5%)", percent: "0.6%", desc: "인구의 대부분이 무슬림이며, 기독교인은 아주 적어요. 기도가 많이 필요한 땅입니다." },
            { name: "이란 (Iran)", flag: "🇮🇷", religion: "이슬람교 (99.4%)", percent: "0.4%", desc: "놀랍게도 마음속으로 예수님을 믿는 사람들이 세계에서 가장 빠르게 늘어나는 나라 중 하나예요!" },
            { name: "네팔 (Nepal)", flag: "🇳🇵", religion: "힌두교 (80.6%)", percent: "2.9%", desc: "히말라야 산맥이 있는 아름다운 곳이에요. 최근 기독교인이 빠르게 늘고 있답니다." },
            { name: "알제리 (Algeria)", flag: "🇩🇿", religion: "이슬람교 (99.0%)", percent: "0.3%", desc: "북아프리카의 넓은 나라예요. 사막 근처의 종족들이 복음을 기다리고 있어요." }
        ];

        function recommendMission() {
            const field = missionFields[Math.floor(Math.random() * missionFields.length)];
            document.getElementById('result-card').style.display = 'block';
            document.getElementById('flag-icon').innerText = field.flag;
            document.getElementById('country').innerText = field.name;
            document.getElementById('religion').innerText = field.religion;
            document.getElementById('percent').innerText = field.percent;
            document.getElementById('description').innerText = field.desc;

            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#4facfe', '#ffeaa7', '#d63031'] });
        }
    </script>
</body>
</html>
