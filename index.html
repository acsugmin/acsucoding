<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎈 선교지를 찾아라!</title>
    
    <!-- 둥글둥글 귀여운 폰트 (나눔스퀘어 라운드 대용) -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <!-- 폭죽 효과 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { 
            --primary-color: #74b9ff; /* 부드러운 하늘색 */
            --point-color: #fab1a0;   /* 따뜻한 코랄색 */
            --bg-color: #fff9f0;      /* 포근한 베이지색 */
        }

        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: var(--bg-color); 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            color: #2d3436;
            word-break: keep-all;
        }

        .container { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 40px; /* 아주 둥글게! */
            box-shadow: 0 15px 0 rgba(116, 185, 255, 0.1); /* 귀여운 입체감 */
            text-align: center; 
            width: 85%; 
            max-width: 400px; 
            border: 4px solid #74b9ff;
            position: relative;
        }

        h1 { 
            color: #0984e3; 
            font-size: 1.8rem; 
            font-weight: 800;
            margin-bottom: 0.5rem; 
        }

        p.subtitle {
            color: #636e72;
            margin-bottom: 2rem;
            font-size: 1rem;
        }

        .btn-mission { 
            background: var(--primary-color); 
            color: white; 
            border: none; 
            padding: 18px 30px; 
            font-size: 1.2rem; 
            font-weight: 800; 
            border-radius: 30px; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            display: inline-flex; 
            align-items: center; 
            gap: 12px; 
            width: 100%;
            justify-content: center;
            box-shadow: 0 6px 0 #0984e3; /* 버튼에 입체감 추가 */
            margin-bottom: 6px;
        }

        .btn-mission:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #0984e3;
        }

        .btn-mission:hover {
            background: #81ecec; /* 호버 시 색깔 바뀜 */
            color: #000;
        }

        #result-card { 
            margin-top: 2.5rem; 
            padding: 1.5rem; 
            border-radius: 30px; 
            background: #f0f7ff; 
            border: 3px dashed #74b9ff; 
            display: none; 
            animation: bounceIn 0.6s ease; 
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }

        .flag-box { font-size: 4.5rem; margin-bottom: 10px; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1)); }
        .country-name { font-size: 1.6rem; font-weight: 800; color: #2d3436; margin-bottom: 15px; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .info-item { background: white; padding: 12px; border-radius: 20px; border: 2px solid #e1f0ff; }
        .info-label { font-weight: 800; color: #74b9ff; font-size: 0.8rem; display: block; margin-bottom: 5px; }
        .info-value { font-weight: 800; font-size: 0.9rem; color: #2d3436; }
        
        #description { color: #636e72; font-size: 0.95rem; line-height: 1.6; text-align: left; background: white; padding: 15px; border-radius: 20px; }

        /* 제작자 지민 섹션 - 귀염 테마 */
        .footer { margin-top: 40px; text-align: center; padding-bottom: 40px; }
        .maker-name { 
            display: inline-block;
            background: #fab1a0;
            color: white;
            padding: 8px 25px;
            border-radius: 40px 0 40px 0; /* 독특하고 귀여운 모양 */
            font-weight: 800;
            font-size: 1.1rem;
            box-shadow: 4px 4px 0 #e17055;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>✨ 선교지를 찾아라! ✨</h1>
        <p class="subtitle">어떤 나라를 위해 기도할까요? 🔍</p>
        
        <button class="btn-mission" onclick="findMission()">
            <i class="fas fa-search"></i> 선교지 찾기!
        </button>

        <div id="result-card">
            <div id="flag-icon" class="flag-box">📍</div>
            <div id="country" class="country-name">국가 정보</div>
            <div class="info-grid">
                <div class="info-item">
                    <span class="info-label">🕍 주요 종교</span>
                    <span id="religion" class="info-value">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">⛪ 기독교 비율</span>
                    <span id="percent" class="info-value">-</span>
                </div>
            </div>
            <div id="description"></div>
        </div>
    </div>

    <div class="footer">
        <div class="maker-name">🍀 제작자: 지민 🍀</div>
    </div>

    <script>
        // (미션 필드 데이터는 동일하여 중복 생략, 지민이가 가진 30개국 리스트를 여기에 넣으면 돼!)
        const missionFields = [
            { name: "인도 (India)", flag: "🇮🇳", religion: "힌두교 (79.5%)", percent: "2.1%", desc: "인도에는 아직 예수님을 모르는 친구들이 정말 많아요! 🇮🇳" },
            { name: "파키스탄 (Pakistan)", flag: "🇵🇰", religion: "이슬람교 (96.5%)", percent: "0.6%", desc: "어려운 환경 속에서도 믿음을 지키는 사람들을 위해 기도해주세요! 🙏" },
            { name: "이란 (Iran)", flag: "🇮🇷", religion: "이슬람교 (99.4%)", percent: "0.4%", desc: "놀랍게도 이란에서는 지금 많은 사람이 예수님을 만나고 있대요! 🕊️" },
            { name: "네팔 (Nepal)", flag: "🇳🇵", religion: "힌두교 (80.6%)", percent: "2.9%", desc: "높은 산들이 많은 네팔에 복음의 소식이 널리 퍼지길 소망해요! 🏔️" },
            { name: "일본 (Japan)", flag: "🇯🇵", religion: "신토/불교 (90%+)", percent: "0.8%", desc: "가까운 나라 일본 친구들이 참된 평안을 얻길 함께 기도해요! 🌸" }
            // ... (지민이가 가진 나머지 25개국 리스트도 여기에 꼭 넣어줘!)
        ];

        function findMission() {
            const field = missionFields[Math.floor(Math.random() * missionFields.length)];
            
            const card = document.getElementById('result-card');
            card.style.display = 'block';
            
            document.getElementById('flag-icon').innerText = field.flag;
            document.getElementById('country').innerText = field.name;
            document.getElementById('religion').innerText = "🕍 " + field.religion;
            document.getElementById('percent').innerText = "⛪ " + field.percent;
            document.getElementById('description').innerHTML = "💌 " + field.desc;

            // 알록달록 폭죽!
            confetti({
                particleCount: 150,
                spread: 100,
                origin: { y: 0.6 },
                colors: ['#ff7675', '#74b9ff', '#55efc4', '#ffeaa7']
            });
        }
    </script>
</body>
</html>
